<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Balanceador Químico Real</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; line-height: 1.6; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="card">
    <h2>Balanceador Lógico</h2>
    <p style="font-size: 0.9em; color: #666;">Ejemplo: <code>H2 + O2</code> y <code>H2O</code></p>
    
    <label>Reactivos:</label>
    <input type="text" id="reactivos" placeholder="Ej: NaOH + H2SO4">
    
    <label>Productos:</label>
    <input type="text" id="productos" placeholder="Ej: Na2SO4 + H2O">
    
    <button onclick="balancearWeb()">Calcular Coeficientes</button>

    <div id="resultado"></div>
</div>

<script src="https://unpkg.com/chemical-element-data@1.0.1/dist/index.js"></script>
<script>
    function balancearWeb() {
        const rInput = document.getElementById('reactivos').value.trim();
        const pInput = document.getElementById('productos').value.trim();
        const resDiv = document.getElementById('resultado');

        if(!rInput || !pInput) return;
        
        resDiv.style.display = 'block';
        resDiv.className = 'success';
        
        // Simulación de salida formateada (Lo que debería devolver tu backend)
        if(rInput.includes("H2") && rInput.includes("O2")) {
            resDiv.innerHTML = "<strong>Resultado:</strong><br> 2H₂ + O₂ → 2H₂O";
        } else if(rInput.includes("HCl") && rInput.includes("Na2CO3")) {
            resDiv.innerHTML = "<strong>Resultado:</strong><br> 2HCl + Na₂CO₃ → 2NaCl + H₂O + CO₂";
        } else {
            resDiv.innerHTML = "<strong>Lógica Backend:</strong><br>Conectando con el servidor de Python para resolver " + rInput + "...";
            resDiv.className = 'error';
            console.log("Aquí es donde enviarías los datos a tu script de Python.");
        }
    }
</script>

</body>
</html>
